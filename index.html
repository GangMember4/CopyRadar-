
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Radar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Copy Radar</div>
        <a href="https://twitter.com/" class="social-link" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/X_logo_2023.svg/1200px-X_logo_2023.svg.png" alt="Twitter" class="social-icon">
        </a>
    </header>

    <main>
        <div class="radar-container">
            <img src="radar.png" class="radar" alt="Static Radar" />
            <button class="start-button" onclick="startScanning()">Start Scanning</button>
        </div>

        <div class="wallet-input" style="display:none;">
            <input type="text" id="walletAddress" placeholder="Paste wallet address" />
            <button onclick="scanWallet()">Scan</button>
        </div>

        <div class="result" style="display:none;">
            <p id="resultText"></p>
            <button onclick="showTokenPrompt()">View with Tokens</button>
        </div>

        <div class="token-prompt" style="display:none;">
            <p>To see your copy traders, please enter the project token.</p>
            <input type="text" id="tokenInput" placeholder="Enter Token" />
            <button onclick="showCopyTraders()">Submit</button>
        </div>

        <div class="copy-traders" style="display:none;">
            <p>Here are your copy traders!</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
