
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Radar</title>
    <style>
        /* Основной стиль страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #000; /* Черный фон */
        }

        /* Фон с космическими эффектами */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('background-image.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стиль для радарного изображения */
        .radar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; /* Размер радара */
            height: 200px;
        }

        /* Стиль текста "COPY RADAR" */
        .header {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #00FF00;
            text-shadow: 3px 3px 5px rgba(0, 255, 0, 0.7);
            font-weight: bold;
        }

        /* Стиль для поля ввода */
        .input-field {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: 2px solid #00FF00;
            font-size: 18px;
            color: white;
            background-color: transparent;
            text-align: center;
            outline: none;
        }

        /* Стиль для кнопки "Scan" */
        .scan-button {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background-color: #00FF00;
            border-radius: 25px;
            color: black;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .scan-button:hover {
            background-color: #00cc00;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">COPY RADAR</div>
        <img src="radar.png" alt="Radar" class="radar">
        <input type="text" placeholder="Paste wallet address" class="input-field">
        <button class="scan-button">Scan</button>
    </div>
</body>
</html>
