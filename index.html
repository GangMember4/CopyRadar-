
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Radar</title>
    <style>
        /* Основной стиль страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* Контейнер для фона и радара */
        .container {
            position: relative;
            width: 600px;
            height: 400px;
            background: url('background-image.png') no-repeat center center;
            background-size: cover;
        }

        /* Анимация для радара */
        .radar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRadar 5s linear infinite;
        }

        /* Анимация вращения радара */
        @keyframes rotateRadar {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Текст */
        .text {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-family: Arial, sans-serif;
            font-size: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 255, 0, 0.7);
        }

        /* Стиль для кнопки */
        .button {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #00ff00;
            padding: 12px 30px;
            border-radius: 25px;
            color: black;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #00cc00;
        }

    </style>
</head>
<body>

    <div class="container">
        <img src="radar.png" alt="Radar" class="radar">
        <div class="text">Start Scanning</div>
        <button class="button">Scan</button>
    </div>

</body>
</html>
